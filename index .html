<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aya 💖 Birthday Slides</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    overflow:hidden;
    background:black;
    color:white;
}

/* SLIDES SYSTEM */
.slide{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    transform:scale(0.9);
    transition:1s ease;
    pointer-events:none;
}

.slide.active{
    opacity:1;
    transform:scale(1);
    pointer-events:auto;
}

/* BACKGROUND */
.bg{
    background: radial-gradient(circle,#ff9a9e,#c084fc,#1a1a2e);
}

/* INTRO */
#intro{
    background:black;
}

/* GIFT */
.gift{
    position:relative;
    width:120px;
    height:120px;
    cursor:pointer;
    margin-top:20px;
}

.box{
    width:100%;
    height:100%;
    background:#ff4b8b;
    border-radius:10px;
}

.lid{
    width:120px;
    height:40px;
    background:#ff1e6c;
    position:absolute;
    top:-40px;
    transform-origin:bottom;
    transition:0.8s;
}

.ribbon{
    width:20px;
    height:120px;
    background:white;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.gift.open .lid{
    transform:rotate(-120deg);
}

/* HEARTS */
.heart{
    position:absolute;
    font-size:20px;
    animation:float 3s forwards;
}

@keyframes float{
    to{
        transform:translateY(-250px);
        opacity:0;
    }
}

/* MESSAGE */
#msg{
    width:80%;
    font-size:20px;
    margin-top:20px;
    line-height:1.6;
}
</style>
</head>

<body>

<!-- SLIDE 1: INTRO -->
<div class="slide active" id="s1">
    <h1>🎥 Aya 💖</h1>
    <p>Loading your surprise...</p>
    <button onclick="next()">Start ➡️</button>
</div>

<!-- SLIDE 2: GIFT -->
<div class="slide bg" id="s2">

    <h2>🎁 عندي ليك مفاجأة</h2>

    <div class="gift" onclick="openGift(this)">
        <div class="lid"></div>
        <div class="box"></div>
        <div class="ribbon"></div>
    </div>

    <div id="msg"></div>

    <button onclick="next()">Next ➡️</button>
</div>

<!-- SLIDE 3: FINAL -->
<div class="slide bg" id="s3">
    <h1>💖 النهاية</h1>
    <p>Aya ❤️ نتي أغلى حاجة عندي 🥺</p>
    <button onclick="prev()">⬅️ Back</button>
</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

let current=1;

/* SLIDES CONTROL */
function show(n){
    document.querySelectorAll(".slide").forEach(s=>s.classList.remove("active"));
    document.getElementById("s"+n).classList.add("active");
    current=n;
}

function next(){
    if(current<3) show(current+1);
}

function prev(){
    if(current>1) show(current-1);
}

/* TYPEWRITER */
let message = "🎉 عيد ميلاد سعيد Aya 💖\n\nمن نهار دخلتي لحياتي وكلشي تبدل...\nوليت كنفرح ونبتسم أكثر 🥺💕\n\nكنبغيك بزاف ❤️";

let i=0;

function typeWriter(){
    if(i<message.length){
        document.getElementById("msg").innerHTML+=message.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}

/* GIFT OPEN */
function openGift(el){

    el.classList.add("open");

    /* hearts explosion */
    for(let i=0;i<30;i++){
        let h=document.createElement("div");
        h.classList.add("heart");
        h.innerHTML="💖";

        h.style.left="50%";
        h.style.top="50%";

        let x=(Math.random()-0.5)*300;
        let y=(Math.random()-1)*300;

        h.style.transform=`translate(${x}px,${y}px)`;

        document.body.appendChild(h);

        setTimeout(()=>h.remove(),3000);
    }

    setTimeout(()=>{
        typeWriter();
    },800);
}

</script>

</body>
</html>

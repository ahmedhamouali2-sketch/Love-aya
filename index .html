<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aya 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 10;
}

#intro h1 {
    font-size: 3em;
    opacity: 0;
    animation: fadeIn 2s forwards;
}

#intro p {
    opacity: 0;
    animation: fadeIn 2s 2s forwards;
}

@keyframes fadeIn {
    to {opacity: 1;}
}

/* MAIN */
#main {
    display: none;
    width: 100%;
    height: 100vh;
    background: radial-gradient(circle, #ff9a9e, #c084fc, #1a1a2e);
    text-align: center;
}

/* GIFT */
.gift {
    position: relative;
    width: 130px;
    height: 130px;
    margin: auto;
    margin-top: 120px;
    cursor: pointer;
}

.box {
    width: 100%;
    height: 100%;
    background: #ff4b8b;
    border-radius: 12px;
}

.lid {
    width: 130px;
    height: 40px;
    background: #ff1e6c;
    position: absolute;
    top: -40px;
    border-radius: 12px 12px 0 0;
    transform-origin: bottom;
    transition: transform 0.8s ease;
}

.ribbon {
    width: 20px;
    height: 130px;
    background: white;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

/* OPEN */
.gift.open .lid {
    transform: rotate(-120deg) translateY(-10px);
}

/* HEARTS */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 3s ease-out forwards;
}

@keyframes float {
    to {
        transform: translateY(-250px) scale(1.5);
        opacity: 0;
    }
}

/* MESSAGE */
#msg {
    margin-top: 40px;
    font-size: 22px;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transform: translateY(20px);
    transition: all 1s ease;
    line-height: 1.6;
}

#msg.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>Aya 💖</h1>
    <p>عندي ليك مفاجأة خاصة...</p>
</div>

<!-- MAIN -->
<div id="main">

    <h2>🎁 حلّي الهدية</h2>

    <div class="gift" onclick="openGift()">
        <div class="lid"></div>
        <div class="box"></div>
        <div class="ribbon"></div>
    </div>

    <div id="msg"></div>

</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
/* INTRO */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
},4000);

/* TYPEWRITER MESSAGE */
let message = "🎉 عيد ميلاد سعيد Aya 💖\n\nAya ❤️\nمن نهار دخلتي لحياتي وكلشي تبدل...\nوليت كنفرح بأبسط الحوايج غير حيث نتي فيهم 🥺💕\n\nكنتمنا ليك عام جديد مليان فرح ونجاح ✨\nوكنتمنا نبقاو ديما مجموعين 💖\n\nكنبغيك بزاف ❤️";

let i = 0;
function typeMessage() {
    if (i < message.length) {
        document.getElementById("msg").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeMessage, 40);
    }
}

/* GIFT OPEN */
function openGift(){
    let gift = document.querySelector(".gift");
    let msg = document.getElementById("msg");

    gift.classList.add("open");

    /* hearts explosion */
    for(let i=0;i<40;i++){
        let h=document.createElement("div");
        h.classList.add("heart");
        h.innerHTML="💖";

        h.style.left="50%";
        h.style.top="50%";

        let x=(Math.random()-0.5)*300;
        let y=(Math.random()-1)*300;

        h.style.transform=`translate(${x}px, ${y}px)`;

        document.body.appendChild(h);

        setTimeout(()=>h.remove(),3000);
    }

    /* show message */
    setTimeout(()=>{
        msg.classList.add("show");
        typeMessage();
    },800);
}
</script>

</body>
</html>
